<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>音乐可视化播放器</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1 class="app-title">音乐可视化播放器</h1>
      <div class="header-controls">
        <div class="mode-tabs" id="modeTabs">
          <button class="mode-tab active" data-mode="bars">频谱柱状</button>
          <button class="mode-tab" data-mode="circular">环形频谱</button>
          <button class="mode-tab" data-mode="waveform">波形图</button>
        </div>
        <button class="theme-btn" id="themeBtn" title="切换主题">&#9790;</button>
      </div>
    </header>

    <div class="main-area">
      <div class="canvas-container" id="canvasContainer">
        <canvas id="visualizer"></canvas>
        <div class="drop-overlay" id="dropOverlay">
          <div class="drop-hint">
            <span class="drop-icon">+</span>
            <p>拖放音乐文件到此处</p>
            <p class="drop-sub">支持 MP3 / WAV / OGG / FLAC</p>
          </div>
        </div>
      </div>

      <aside class="playlist-panel" id="playlistPanel">
        <div class="playlist-header">
          <h3>播放列表</h3>
          <div class="playlist-actions">
            <button class="add-btn outline" id="scanFolderBtn">扫描文件夹</button>
            <button class="add-btn" id="addMusicBtn">+ 添加音乐</button>
          </div>
        </div>
        <ul class="playlist" id="playlist"></ul>
        <div class="demo-section">
          <button class="demo-btn" id="demoBtn">&#9654; Demo 演示</button>
          <p class="demo-hint">无需音乐文件，生成演示节拍</p>
        </div>
      </aside>
    </div>

    <div class="player-bar">
      <div class="progress-wrap" id="progressWrap">
        <div class="progress-track">
          <div class="progress-fill" id="progressFill"></div>
          <div class="progress-thumb" id="progressThumb"></div>
        </div>
      </div>
      <div class="player-controls">
        <div class="control-group">
          <button class="ctrl-btn" id="prevBtn" title="上一首">&#9664;&#9664;</button>
          <button class="ctrl-btn play-btn" id="playBtn" title="播放">&#9654;</button>
          <button class="ctrl-btn" id="nextBtn" title="下一首">&#9654;&#9654;</button>
        </div>
        <div class="control-group time-group">
          <span class="time-label" id="currentTime">00:00</span>
          <span class="time-sep">/</span>
          <span class="time-label" id="durationTime">00:00</span>
        </div>
        <div class="control-group volume-group">
          <span class="volume-icon">&#9835;</span>
          <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="70" title="音量">
        </div>
      </div>
    </div>
  </div>

  <input type="file" id="fileInput" accept="audio/*" multiple hidden>

  <script src="js/audio-engine.js"></script>
  <script src="js/visualizer.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
